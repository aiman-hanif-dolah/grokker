name: grokker
description: SuperGrok desktop coding client for Grok Build CLI via ACP.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  file_picker: ^8.3.7
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  window_manager: ^0.4.3
  desktop_drop: ^0.7.1
  flutter_markdown: ^0.7.7+1
  super_clipboard: ^0.9.1

  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/